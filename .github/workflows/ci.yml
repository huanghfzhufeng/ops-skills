name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate plugin.json
        run: |
          python3 -c "
          import json
          data = json.load(open('.claude-plugin/plugin.json'))
          for f in ['name', 'version', 'description']:
              assert f in data, f'plugin.json 缺字段 {f}'
          print(f'✓ plugin.json: {data[\"name\"]} v{data[\"version\"]}')
          "

      - name: Validate marketplace.json
        run: |
          python3 -c "
          import json
          data = json.load(open('.claude-plugin/marketplace.json'))
          for f in ['name', 'owner', 'plugins']:
              assert f in data, f'marketplace.json 缺字段 {f}'
          assert data['plugins'], 'plugins[] 不能为空'
          print(f'✓ marketplace.json: {data[\"name\"]} 含 {len(data[\"plugins\"])} 个 plugin')
          "

      - name: Validate version consistency
        run: |
          python3 -c "
          import json
          pj = json.load(open('.claude-plugin/plugin.json'))
          mj = json.load(open('.claude-plugin/marketplace.json'))
          plugin_v = pj['version']
          mp_v = mj['plugins'][0]['version']
          assert plugin_v == mp_v, f'version 不一致 plugin.json={plugin_v} marketplace.json={mp_v}. 跑 ./bump-version.sh <version> 同步'
          print(f'✓ version 同步: {plugin_v}')
          "

      - name: Validate SKILL.md frontmatter
        run: |
          python3 << 'EOF'
          import re
          from pathlib import Path

          errors = []
          for skill_md in sorted(Path('skills').rglob('SKILL.md')):
              content = skill_md.read_text()
              m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
              if not m:
                  errors.append(f'{skill_md}: 缺 frontmatter'); continue
              fm = m.group(1)
              desc = re.search(r'^description:\s*(.+?)(?=\n\w+:|\Z)', fm, re.M | re.DOTALL)
              if not desc:
                  errors.append(f'{skill_md}: 缺 description'); continue
              d = desc.group(1).strip()
              if len(d) > 1536:
                  errors.append(f'{skill_md}: description {len(d)} > 1536')
              else:
                  print(f'✓ {skill_md}: description {len(d)} 字符')
          if errors:
              for e in errors: print(f'✗ {e}')
              raise SystemExit(1)
          EOF

  test:
    name: pytest
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python3 -m py_compile skills/xcmo-mobile/mobile.py skills/tk-template-scout/scout.py skills/tk-template-scout/scout_strict.py skills/tk-template-scout/render_briefing.py skills/tk-template-scout/grab_viral_challenges.py skills/tk-template-scout/validate_translated.py
      - run: bash -n setup.sh  # 验证 setup.sh 语法
      - run: pytest -v -m unit
