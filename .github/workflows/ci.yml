name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate marketplace + plugin structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate marketplace.json schema
        run: |
          python3 -c "
          import json
          data = json.load(open('.claude-plugin/marketplace.json'))
          required = ['name', 'owner', 'plugins']
          missing = [f for f in required if f not in data]
          if missing:
              raise SystemExit(f'marketplace.json 缺字段: {missing}')
          if not data['plugins']:
              raise SystemExit('marketplace.json plugins[] 为空')
          for p in data['plugins']:
              for pf in ['name', 'source']:
                  if pf not in p:
                      raise SystemExit(f'plugin[{p.get(\"name\", \"?\")}] 缺字段: {pf}')
          print(f'✓ marketplace.json valid: {data[\"name\"]} 含 {len(data[\"plugins\"])} 个 plugin')
          "

      - name: Validate each plugin.json
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path

          mp = json.load(open('.claude-plugin/marketplace.json'))
          errors = []

          for entry in mp['plugins']:
              source = entry.get('source', './').lstrip('./')
              plugin_dir = Path(source) if source else Path('.')
              plugin_json = plugin_dir / '.claude-plugin' / 'plugin.json'

              if not plugin_json.exists():
                  errors.append(f"{entry['name']}: 找不到 {plugin_json}")
                  continue

              try:
                  data = json.loads(plugin_json.read_text())
              except json.JSONDecodeError as e:
                  errors.append(f"{plugin_json}: JSON 解析失败 {e}")
                  continue

              for f in ['name', 'version', 'description']:
                  if f not in data:
                      errors.append(f"{plugin_json}: 缺字段 {f}")

              # plugin name 必须和 marketplace entry name 一致
              if data.get('name') != entry['name']:
                  errors.append(
                      f"{plugin_json}: name='{data.get('name')}' "
                      f"≠ marketplace.json::plugins[].name='{entry['name']}'"
                  )

              print(f"✓ {entry['name']} v{data.get('version')}")

          if errors:
              for e in errors: print(f"✗ {e}")
              raise SystemExit(1)
          EOF

      - name: Validate version consistency (plugin.json ↔ marketplace.json)
        run: |
          python3 << 'EOF'
          import json
          from pathlib import Path

          mp = json.load(open('.claude-plugin/marketplace.json'))
          errors = []

          for entry in mp['plugins']:
              source = entry.get('source', './').lstrip('./')
              plugin_dir = Path(source) if source else Path('.')
              plugin_json = plugin_dir / '.claude-plugin' / 'plugin.json'
              data = json.loads(plugin_json.read_text())

              entry_v = entry.get('version')
              plugin_v = data.get('version')

              if entry_v != plugin_v:
                  errors.append(
                      f"{entry['name']}: marketplace.json version='{entry_v}' "
                      f"≠ {plugin_json}::version='{plugin_v}'. "
                      f"记得跑 ./bump-version.sh {entry['name']} <new-version>"
                  )
              else:
                  print(f"✓ {entry['name']} version 同步: {plugin_v}")

          if errors:
              for e in errors: print(f"✗ {e}")
              raise SystemExit(1)
          EOF

      - name: Validate every SKILL.md frontmatter
        run: |
          python3 << 'EOF'
          import re
          from pathlib import Path

          errors = []
          for skill_md in sorted(Path('plugins').rglob('SKILL.md')):
              content = skill_md.read_text()
              m = re.match(r'^---\n(.*?)\n---', content, re.DOTALL)
              if not m:
                  errors.append(f'{skill_md}: 缺 YAML frontmatter')
                  continue
              fm = m.group(1)
              desc_m = re.search(r'^description:\s*(.+?)(?=\n\w+:|\Z)', fm, re.M | re.DOTALL)
              if not desc_m:
                  errors.append(f'{skill_md}: 缺 description')
                  continue
              desc_len = len(desc_m.group(1).strip())
              if desc_len > 1536:
                  errors.append(f'{skill_md}: description {desc_len} 字符 > 1536 上限')
              else:
                  print(f'✓ {skill_md}: description {desc_len} 字符')

          if errors:
              for e in errors: print(f'✗ {e}')
              raise SystemExit(1)
          EOF

  test:
    name: pytest
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Verify Python syntax across all plugins
        run: |
          find plugins -name "*.py" -print0 | xargs -0 -n1 python3 -m py_compile

      - name: Run pytest across all plugins
        run: pytest -v -m unit
